<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Sneaker Drop Tracker</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body>
    <div id="site-header"></div>

    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">WDD330 Final Project</p>
          <h1 id="page-title">The Sneaker Drop Tracker</h1>
          <p>
            Track upcoming sneaker releases, save your grails, estimate resale
            value by size, and follow brand news from one focused dashboard.
          </p>
        </div>

        <div class="hero-stat" aria-live="polite">
          <span id="watchlist-count">0</span>
          <p>Saved Grails</p>
        </div>
      </section>

      <section class="controls" aria-label="Search and filter sneakers">
        <label class="search-field">
          <span>Search drops</span>
          <input
            id="search-input"
            type="search"
            placeholder="Try Travis Scott, Air Max, Jordan..."
          />
        </label>

        <div class="brand-filter" aria-label="Filter by brand">
          <button class="active" type="button" data-brand="all">All</button>
          <button type="button" data-brand="Nike">Nike</button>
          <button type="button" data-brand="Jordan">Jordan</button>
          <button type="button" data-brand="Adidas">Adidas</button>
          <button type="button" data-brand="New Balance">New Balance</button>
        </div>
      </section>

      <section class="dashboard-layout">
        <section class="release-section" id="release-calendar">
          <div class="section-heading">
            <p class="eyebrow">Release Calendar</p>
            <h2>Upcoming Drops</h2>
          </div>
          <div id="status-message" class="status-message" role="status"></div>
          <div id="sneaker-grid" class="sneaker-grid"></div>
        </section>

        <aside class="sidebar" aria-label="Selected sneaker details and news">
          <section class="panel">
            <p class="eyebrow">Selected Sneaker</p>
            <div id="detail-content"></div>
          </section>

          <section class="panel" id="news-panel">
            <p class="eyebrow">Streetwear News</p>
            <div id="news-content"></div>
          </section>
        </aside>
      </section>
    </main>

    <div id="site-footer"></div>
  </body>
</html>
