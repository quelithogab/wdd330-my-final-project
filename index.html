<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Sneaker Drop Tracker</title>
    <link rel="stylesheet" href="src/css/styles.css" />
    <script type="module" src="src/js/main.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Final Project</p>
        <h1>The Sneaker Drop Tracker</h1>
        <p class="intro">
          Track upcoming sneaker releases, compare estimated resale value, and
          save your grails before the drop.
        </p>
      </div>

      <div class="watch-count">
        <span id="watchlist-count">0</span>
        <span>My Grails</span>
      </div>
    </header>

    <main>
      <section class="toolbar">
        <label class="search-field">
          <span>Search drops</span>
          <input
            id="search-input"
            type="search"
            placeholder="Try Travis Scott, Air Max, Jordan..."
          />
        </label>

        <div class="brand-filter">
          <button class="filter-button active" data-brand="all">All</button>
          <button class="filter-button" data-brand="Nike">Nike</button>
          <button class="filter-button" data-brand="Jordan">Jordan</button>
          <button class="filter-button" data-brand="Adidas">Adidas</button>
          <button class="filter-button" data-brand="New Balance">New Balance</button>
        </div>
      </section>

      <section class="content-grid">
        <section>
          <div class="section-heading">
            <p class="eyebrow">Release Calendar</p>
            <h2>Upcoming Drops</h2>
          </div>

          <div id="sneaker-grid" class="sneaker-grid"></div>
        </section>

        <aside class="detail-panel">
          <p class="eyebrow">Selected Drop</p>
          <div id="detail-content"></div>
        </aside>
      </section>
    </main>
  </body>
</html>
